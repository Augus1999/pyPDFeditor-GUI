name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create / update a GitHub Release with the .exe"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Read Distilmark version
        id: version
        shell: bash
        run: |
          v=$(grep -E '^__version__' distilmark/_version.py | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          echo "Distilmark version: $v"

      - name: Build Distilmark Windows executable
        run: |
          pyinstaller --noconfirm --onefile --windowed --name Distilmark `
            --collect-all pymupdf `
            --collect-all pymupdf4llm `
            --collect-all pdfplumber `
            --icon icon.ico `
            distilmark_launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: distilmark-windows
          path: dist/Distilmark.exe

      # Tag-triggered runs: publish release at that tag.
      - name: Attach to release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Distilmark.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Manual runs: create/update a release using the version from _version.py.
      - name: Attach to release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Distilmark ${{ steps.version.outputs.tag }}
          files: dist/Distilmark.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
